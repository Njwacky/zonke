<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <!-- Outer Shield Background -->
    <rect width="512" height="512" rx="116" fill="#1a1a1a" stroke="#f39c12" stroke-width="16" />
    
    <!-- Kasi Paper Grid Interior -->
    <rect x="28" y="28" width="456" height="456" rx="94" fill="#fdf6e3" />
    <g stroke="rgba(50,50,50,0.14)" stroke-width="2">
        <line x1="28" y1="120" x2="484" y2="120" />
        <line x1="28" y1="210" x2="484" y2="210" />
        <line x1="28" y1="300" x2="484" y2="300" />
        <line x1="28" y1="390" x2="484" y2="390" />
        <line x1="150" y1="28" x2="150" y2="484" />
        <line x1="260" y1="28" x2="260" y2="484" />
        <line x1="370" y1="28" x2="370" y2="484" />
    </g>

    <!-- Inner Dark Charcoal Shield -->
    <path d="M 256 64 L 430 110 L 410 330 Q 256 460 256 460 Q 102 330 82 110 Z" fill="#1a1a1a" stroke="#f39c12" stroke-width="12" stroke-linejoin="round" />

    <!-- Chibi Combat Soldier Emblem (`🪖 Head + Helmet + Goggles`) -->
    <g transform="translate(256, 230) scale(3.6)">
        <circle cx="0" cy="-14" r="13" fill="#eceff1" stroke="#f39c12" stroke-width="2.5" />
        <!-- Helmet Visor / Goggles -->
        <path d="M -11 -20 Q 0 -12 11 -20 L 11 -13 L -11 -13 Z" fill="#00e5ff" stroke="#f39c12" stroke-width="2" />
        <line x1="0" y1="-2" x2="0" y2="5" stroke="#f39c12" stroke-width="5" stroke-linecap="round" />
        <!-- Torso & AKM Silhouette -->
        <path d="M -14 6 L 14 6 L 12 30 L -12 30 Z" fill="#2e7d32" stroke="#f39c12" stroke-width="2.5" />
        <!-- Golden Star on Chest -->
        <polygon points="0,11 3,19 11,19 5,24 7,32 0,27 -7,32 -5,24 -11,19 -3,19" fill="#f1c40f" transform="translate(0, 4) scale(0.45)" />
    </g>

    <!-- Bold Top Banner (`ZONKE`) -->
    <rect x="86" y="52" width="340" height="74" rx="16" fill="#f39c12" stroke="#1a1a1a" stroke-width="8" />
    <text x="256" y="104" font-family="'Courier New', Courier, monospace" font-weight="900" font-size="52" fill="#1a1a1a" text-anchor="middle" letter-spacing="4">ZONKE</text>

    <!-- Bottom Banner (`TACTICAL DUEL`) -->
    <rect x="100" y="396" width="312" height="54" rx="14" fill="#00e5ff" stroke="#1a1a1a" stroke-width="6" />
    <text x="256" y="433" font-family="'Courier New', Courier, monospace" font-weight="900" font-size="28" fill="#1a1a1a" text-anchor="middle" letter-spacing="2">TACTICAL DUEL</text>

    <!-- Target Bullseye Icons on sides -->
    <circle cx="68" cy="88" r="22" fill="#c0392b" stroke="#fff" stroke-width="6" />
    <circle cx="68" cy="88" r="8" fill="#fff" />
    <circle cx="444" cy="88" r="22" fill="#c0392b" stroke="#fff" stroke-width="6" />
    <circle cx="444" cy="88" r="8" fill="#fff" />
</svg>
